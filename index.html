<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BurnRate OS — Çok Yakında</title>
<meta name="theme-color" content="#050409">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#050409;color:#fff;font-family:'DM Sans',sans-serif;overflow:hidden;position:relative;cursor:none;-webkit-font-smoothing:antialiased}
  @media(max-width:768px){body{cursor:auto;overflow-y:auto}}
  .cursor{position:fixed;width:7px;height:7px;background:rgba(255,255,255,0.9);border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:screen}
  .cursor-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(255,255,255,0.35);border-radius:50%;pointer-events:none;z-index:9998;transition:transform .15s,border-color .2s}
  @media(max-width:768px){.cursor,.cursor-ring{display:none}}
  .field{position:fixed;inset:-10%;z-index:0;filter:blur(60px)}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen}
  .bb1{width:55%;height:55%;background:radial-gradient(circle,#8b5cf6,transparent 70%);top:-8%;left:-10%;animation:m1 18s ease-in-out infinite}
  .bb2{width:50%;height:55%;background:radial-gradient(circle,#3b82f6,transparent 70%);bottom:-10%;right:-12%;animation:m2 22s ease-in-out infinite}
  .bb3{width:45%;height:48%;background:radial-gradient(circle,#ec4899,transparent 70%);top:28%;right:-8%;animation:m3 16s ease-in-out infinite}
  .bb4{width:42%;height:45%;background:radial-gradient(circle,#f59e0b,transparent 70%);bottom:10%;left:-8%;animation:m4 24s ease-in-out infinite}
  .bb5{width:38%;height:40%;background:radial-gradient(circle,#06b6d4,transparent 70%);top:42%;left:32%;animation:m1 20s ease-in-out infinite reverse}
  @keyframes m1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(22%,16%) scale(1.2)}}
  @keyframes m2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-18%,-14%) scale(1.25)}}
  @keyframes m3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-16%,18%) scale(0.85)}}
  @keyframes m4{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20%,-16%) scale(1.15)}}
  .darkveil{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at 50% 42%,rgba(5,4,9,0.3) 18%,rgba(5,4,9,0.8) 100%)}
  .grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
  .wrap{position:relative;z-index:5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px}
  .chip{position:fixed;z-index:4;display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:16px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.92);backdrop-filter:blur(10px) saturate(170%);-webkit-backdrop-filter:blur(10px) saturate(170%);background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.22);box-shadow:0 8px 30px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.4),inset 0 -2px 6px rgba(255,255,255,0.06);will-change:transform}
  .chip .e{font-size:15px}
  .c1{top:13%;left:8%;animation:fl 7s ease-in-out infinite}
  .c2{top:20%;right:7%;animation:fl 8.5s ease-in-out infinite .6s}
  .c3{bottom:20%;left:6%;animation:fl 7.8s ease-in-out infinite 1.1s}
  .c4{bottom:14%;right:9%;animation:fl 9s ease-in-out infinite .3s}
  @keyframes fl{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(-1deg)}}
  @media(max-width:900px){.chip{display:none}}
  .lens{position:relative;width:100%;max-width:430px;padding:46px 38px;border-radius:36px;overflow:hidden;will-change:transform;backdrop-filter:blur(24px) saturate(180%) brightness(1.06);-webkit-backdrop-filter:blur(24px) saturate(180%) brightness(1.06);background:linear-gradient(160deg,rgba(255,255,255,0.13),rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.2);box-shadow:0 30px 90px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -3px 14px rgba(255,255,255,0.08),inset 0 0 0 1px rgba(255,255,255,0.04)}
  .lens::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent)}
  .lens::after{content:'';position:absolute;top:-50%;left:-60%;width:55%;height:200%;background:linear-gradient(105deg,transparent,rgba(255,255,255,0.16),transparent);transform:rotate(8deg);animation:sheen 7s ease-in-out infinite;pointer-events:none}
  @keyframes sheen{0%{left:-60%}55%,100%{left:135%}}
  .logo{display:inline-flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:1px;color:rgba(255,255,255,0.9);margin-bottom:26px;position:relative;z-index:2}
  .logo-dot{width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 14px rgba(255,255,255,0.9);animation:pd 2s infinite}
  @keyframes pd{0%,100%{opacity:1}50%{opacity:.55}}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:7px 17px;border-radius:100px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;color:#fff;margin-bottom:26px;position:relative;z-index:2;box-shadow:inset 0 1px 0 rgba(255,255,255,0.3)}
  h1{font-size:clamp(40px,8vw,54px);font-weight:600;line-height:0.96;letter-spacing:-2.5px;color:#fff;margin-bottom:16px;position:relative;z-index:2;text-shadow:0 2px 40px rgba(0,0,0,0.4)}
  .sub{font-size:clamp(14px,2vw,16px);font-weight:300;line-height:1.55;color:rgba(255,255,255,0.78);margin-bottom:34px;position:relative;z-index:2;max-width:34ch;margin-left:auto;margin-right:auto}
  .cd{display:flex;gap:9px;justify-content:center;margin-bottom:34px;position:relative;z-index:2}
  .cdb{flex:1;border-radius:18px;padding:16px 6px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.18);box-shadow:inset 0 1px 0 rgba(255,255,255,0.3),inset 0 -2px 6px rgba(0,0,0,0.1)}
  .cdn{font-family:'DM Mono',monospace;font-size:clamp(24px,5vw,30px);font-weight:500;color:#fff;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,0.3)}
  .cdl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-top:8px}
  .form{display:flex;gap:9px;position:relative;z-index:2}
  .inp{flex:1;border-radius:16px;padding:15px 18px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.22);font-family:'DM Mono',monospace;font-size:14px;color:#fff;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),inset 0 2px 8px rgba(0,0,0,0.15);transition:border-color .2s;cursor:none}
  .inp::placeholder{color:rgba(255,255,255,0.45)}
  .inp:focus{border-color:rgba(255,255,255,0.5)}
  @media(max-width:768px){.inp{cursor:auto}}
  .btn{position:relative;border:none;border-radius:16px;padding:15px 24px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:#1a1030;cursor:none;overflow:hidden;white-space:nowrap;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.82));box-shadow:0 8px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.9);transition:transform .2s}
  .btn:hover{transform:translateY(-1px)}
  @media(max-width:768px){.btn{cursor:auto}}
  .err{height:18px;margin-top:14px;font-family:'DM Mono',monospace;font-size:12px;color:#fca5a5;opacity:0;transition:opacity .25s;position:relative;z-index:2}
  .err.show{opacity:1}
  .note{margin-top:22px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.45);position:relative;z-index:5}
  .social{display:flex;gap:24px;margin-top:18px;position:relative;z-index:5}
  .social a{color:rgba(255,255,255,0.45);text-decoration:none;font-family:'DM Mono',monospace;font-size:12px;transition:color .2s;cursor:none}
  .social a:hover{color:rgba(255,255,255,0.85)}
  @media(max-width:768px){.social a{cursor:auto}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="ring"></div>
<div class="field"><div class="blob bb1"></div><div class="blob bb2"></div><div class="blob bb3"></div><div class="blob bb4"></div><div class="blob bb5"></div></div>
<div class="darkveil"></div>
<div class="grain"></div>
<div class="chip c1" data-d="1"><span class="e">🧠</span> AI Danışman</div>
<div class="chip c2" data-d="2"><span class="e">📈</span> Canlı Yatırım</div>
<div class="chip c3" data-d="3"><span class="e">💰</span> Bakiye</div>
<div class="chip c4" data-d="4"><span class="e">🎯</span> 30 Gün</div>
<div class="wrap">
  <div class="lens" id="lens">
    <div class="logo"><span class="logo-dot"></span> BurnRate OS</div>
    <div class="badge">v2.1 · YENİ SÜRÜM</div>
    <h1>Çok yakında.</h1>
    <div class="sub">Finansal komuta merkezin yeniden tasarlandı. Geri sayım başladı.</div>
    <div class="cd">
      <div class="cdb"><div class="cdn" id="d">00</div><div class="cdl">gün</div></div>
      <div class="cdb"><div class="cdn" id="h">00</div><div class="cdl">saat</div></div>
      <div class="cdb"><div class="cdn" id="m">00</div><div class="cdl">dakika</div></div>
      <div class="cdb"><div class="cdn" id="s">00</div><div class="cdl">saniye</div></div>
    </div>
    <div class="form">
      <input class="inp" id="pw" placeholder="erişim şifresi" type="password" autocomplete="off">
      <button class="btn" id="enter">Giriş →</button>
    </div>
    <div class="err" id="err">Hatalı şifre, tekrar dene.</div>
  </div>
  <div class="note">18 HAZİRAN 2026</div>
  <div class="social">
    <a href="https://instagram.com/burnrateos">Instagram</a>
    <a href="https://twitter.com/burnrateos">Twitter</a>
    <a href="https://tiktok.com/@burnrateos">TikTok</a>
  </div>
</div>
<script>
  const PASSWORD = "burnrate2026";
  try { if (localStorage.getItem('burnrate_access') === 'granted') { window.location.replace('landing.html'); } } catch(e){}
  const pw = document.getElementById('pw'); const err = document.getElementById('err');
  function tryEnter(){ if (pw.value === PASSWORD){ try { localStorage.setItem('burnrate_access','granted'); } catch(e){} window.location.href = 'landing.html'; } else { err.classList.add('show'); pw.value=''; pw.focus(); setTimeout(()=>err.classList.remove('show'), 2500); } }
  document.getElementById('enter').addEventListener('click', tryEnter);
  pw.addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });
  const target = new Date('2026-06-18T00:00:00').getTime();
  function tick(){ const diff = target - Date.now(); if (diff <= 0){ document.querySelector('.cd').innerHTML = '<div style="font-family:DM Mono,monospace;font-size:22px;color:#fff;width:100%">🚀 Yayında!</div>'; return; } const d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000), m=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000); document.getElementById('d').textContent=String(d).padStart(2,'0'); document.getElementById('h').textContent=String(h).padStart(2,'0'); document.getElementById('m').textContent=String(m).padStart(2,'0'); document.getElementById('s').textContent=String(s).padStart(2,'0'); }
  tick(); setInterval(tick, 1000);
  const cursor=document.getElementById('cursor'), ring=document.getElementById('ring');
  let mx=innerWidth/2, my=innerHeight/2, rx=mx, ry=my;
  addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; cursor.style.left=mx-3.5+'px'; cursor.style.top=my-3.5+'px'; });
  (function ar(){ rx+=(mx-rx)*0.14; ry+=(my-ry)*0.14; ring.style.left=rx-17+'px'; ring.style.top=ry-17+'px'; requestAnimationFrame(ar); })();
  document.querySelectorAll('a,button,input').forEach(el=>{ el.addEventListener('mouseenter',()=>{ring.style.transform='scale(1.6)';ring.style.borderColor='rgba(255,255,255,0.7)';}); el.addEventListener('mouseleave',()=>{ring.style.transform='scale(1)';ring.style.borderColor='rgba(255,255,255,0.35)';}); });
  const lens=document.getElementById('lens'); const chips=[...document.querySelectorAll('.chip')];
  addEventListener('mousemove', e=>{ const nx=(e.clientX/innerWidth-0.5), ny=(e.clientY/innerHeight-0.5); chips.forEach(c=>{ const d=parseFloat(c.dataset.d)*6; c.style.transform=`translate(${nx*d}px,${ny*d}px)`; }); lens.style.transform=`translate(${nx*7}px,${ny*7}px)`; });
</script>
</body>
</html>
